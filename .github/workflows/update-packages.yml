            Automated update of **helium** to `${{ steps.update.outputs.version }}`.

            Upstream releases:
            - https://github.com/imputnet/helium-linux/releases/tag/${{ steps.update.outputs.version }}
            - https://github.com/imputnet/helium-macos/releases/tag/${{ steps.update.outputs.version }}
