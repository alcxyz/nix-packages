          body: |
            Automated update of **OmniWM** to `${{ steps.update.outputs.version }}`.

            Upstream release: https://github.com/BarutSRB/OmniWM/releases/tag/v${{ steps.update.outputs.version }}
          labels: automated,packages
          reviewers: alcxyz

