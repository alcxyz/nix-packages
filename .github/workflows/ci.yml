name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/devlog/go.mod

      - name: Test devlog
        run: go test -v ./...
        working-directory: tools/devlog

  nix-build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Build Go tools
        run: |
          nix build .#devlog
          nix build .#pihole-sync
          nix build .#zfs-auto-unlock
