name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          github-server-url: https://git.alc.xyz

      - uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: tools/devlog/go.mod

      - name: Test Go tools
        run: |
          while IFS= read -r mod; do
            dir="$(dirname "$mod")"
            echo "::group::go test ${dir}"
            (cd "$dir" && go test -v ./...)
            echo "::endgroup::"
          done < <(find tools -maxdepth 2 -name go.mod | sort)

  nix-build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          github-server-url: https://git.alc.xyz

      - name: Install runner prerequisites
        run: |
          apt-get update
          apt-get install -y sudo

      - uses: https://github.com/cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate package hashes
        run: scripts/ci/validate-package-hashes.sh

      - name: Build Go tools and changed packages
        run: scripts/ci/build-changed-packages.sh
