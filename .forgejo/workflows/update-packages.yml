name: Update packages

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    name: Update ${{ matrix.package }}
    runs-on: ubuntu-latest
    concurrency:
      group: package-update-${{ matrix.package }}
      cancel-in-progress: false
    env:
      BASE_BRANCH: dev
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - package: t3code
            branch: update/t3code
            title_prefix: "chore(t3code): update to"
            body_name: t3code
            upstream: "https://github.com/pingdotgg/t3code/releases/tag/v"
          - package: omniwm
            branch: update/omniwm
            title_prefix: "chore(omniwm): update to"
            body_name: OmniWM
            upstream: "https://github.com/BarutSRB/OmniWM/releases/tag/v"
          - package: helium
            branch: update/helium
            title_prefix: "chore(helium): update to"
            body_name: helium
            upstream: "https://github.com/imputnet/helium-linux/releases/tag/"
          - package: ghostty
            branch: update/ghostty
            title_prefix: "chore(ghostty): update to"
            body_name: ghostty
            upstream: "https://github.com/ghostty-org/ghostty/releases/tag/v"
          - package: kdash
            branch: update/kdash
            title_prefix: "chore(kdash): update to"
            body_name: kdash
            upstream: "https://github.com/kdash-rs/kdash/releases/tag/v"
          - package: ndrop
            branch: update/ndrop
            title_prefix: "chore(ndrop): update to"
            body_name: ndrop
            upstream: "https://github.com/Schweber/ndrop/commit/"
          - package: ledger-live
            branch: update/ledger-live
            title_prefix: "chore(ledger-live): update to"
            body_name: Ledger Live
            upstream: "https://github.com/LedgerHQ/ledger-live/releases/tag/%40ledgerhq/live-desktop%40"
          - package: claude-code
            branch: update/claude-code
            title_prefix: "chore(claude-code): update to"
            body_name: claude-code
            upstream: "https://www.npmjs.com/package/@anthropic-ai/claude-code/v/"
          - package: codex-cli
            branch: update/codex-cli
            title_prefix: "chore(codex-cli): update to"
            body_name: codex-cli
            upstream: "https://www.npmjs.com/package/@openai/codex/v/"
          - package: codex-app-server
            branch: update/codex-app-server
            title_prefix: "chore(codex-app-server): update to"
            body_name: codex-app-server
            upstream: "https://github.com/openai/codex/releases/tag/rust-v"
          - package: zen-browser
            branch: update/zen-browser
            title_prefix: "chore(zen-browser): update to"
            body_name: "Zen Browser"
            upstream: "https://github.com/zen-browser/desktop/releases/tag/"
          - package: stash
            branch: update/stash
            title_prefix: "chore(stash): update to"
            body_name: Stash
            upstream: "https://github.com/stashapp/stash/releases/tag/v"

    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          github-server-url: https://git.alc.xyz
          ref: dev

      - name: Check out update base
        run: |
          git fetch origin "${BASE_BRANCH}"
          git switch -C "${BASE_BRANCH}" "origin/${BASE_BRANCH}"

      - name: Decide update mode
        id: update_gate
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_URL: https://git.alc.xyz
          FORGEJO_OWNER: alcxyz
          FORGEJO_REPO: nix-packages
          UPDATE_BRANCH: ${{ matrix.branch }}
        run: |
          api_auth="$(mktemp)"
          response="$(mktemp)"
          trap 'rm -f "$api_auth" "$response"' EXIT

          printf 'header = "Authorization: token %s"\n' "$FORGEJO_TOKEN" > "$api_auth"
          printf 'header = "Accept: application/json"\n' >> "$api_auth"

          pulls_url="${FORGEJO_URL}/api/v1/repos/${FORGEJO_OWNER}/${FORGEJO_REPO}/pulls"
          curl -fsS -K "$api_auth" \
            "${pulls_url}?state=open&base=${BASE_BRANCH}&limit=100" \
            -o "$response"

          if UPDATE_BRANCH="$UPDATE_BRANCH" python3 -c 'import json, os, sys; target = os.environ["UPDATE_BRANCH"]; prs = json.load(open(sys.argv[1])); raise SystemExit(0 if any((pr.get("head") or {}).get("ref") == target for pr in prs) else 1)' "$response"
          then
            echo "Existing update PR found for ${UPDATE_BRANCH}; refreshing that branch and PR if a newer upstream version exists."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "mode=refresh_existing_pr" >> "$GITHUB_OUTPUT"
            echo "existing_update_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing update PR for ${UPDATE_BRANCH}; checking upstream from ${BASE_BRANCH}."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "mode=discover_update" >> "$GITHUB_OUTPUT"
            echo "existing_update_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install runner prerequisites
        if: steps.update_gate.outputs.should_run == 'true'
        run: |
          apt-get update
          apt-get install -y sudo xxd

      - uses: https://github.com/cachix/install-nix-action@v30
        if: steps.update_gate.outputs.should_run == 'true'
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check and update ${{ matrix.package }}
        if: steps.update_gate.outputs.should_run == 'true'
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.UPSTREAM_GITHUB_TOKEN }}
        run: |
          rm -rf /homeless-shelter
          bash scripts/update-packages/update-${{ matrix.package }}.sh

      - name: Open or refresh Forgejo PR
        if: steps.update.outputs.updated == 'true'
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_URL: https://git.alc.xyz
          FORGEJO_OWNER: alcxyz
          FORGEJO_REPO: nix-packages
          UPDATE_BRANCH: ${{ matrix.branch }}
          COMMIT_MESSAGE: "${{ matrix.title_prefix }} ${{ steps.update.outputs.version }}"
          PR_TITLE: "${{ matrix.title_prefix }} ${{ steps.update.outputs.version }}"
          BODY_NAME: ${{ matrix.body_name }}
          VERSION: ${{ steps.update.outputs.version }}
          UPSTREAM_URL: "${{ matrix.upstream }}${{ steps.update.outputs.version }}"
          EXISTING_UPDATE_PR: ${{ steps.update_gate.outputs.existing_update_pr }}
        run: scripts/forgejo/upsert-update-pr.sh
